---
- name: Apply all security updates
  yum:
    name: "*"
    state: latest
    security: yes
  register: security_updates
  failed_when: false
  notify: restart critical services
  tags: security_updates

- name: Check current installed kernel
  command: rpm -qa kernel
  register: current_kernel
  changed_when: false
  failed_when: false
  tags: kernel

- name: Check available kernel updates
  command: yum list available kernel --security
  register: available_kernel
  changed_when: false
  failed_when: false
  tags: kernel

- name: Apply kernel update if available
  yum:
    name: kernel
    state: latest
    security: yes
  when:
    - available_kernel.rc == 0
    - "'kernel' in available_kernel.stdout"
  notify: reboot required
  tags: kernel

- name: Log security updates applied
  copy:
    content: |
      ====================================
      Security Updates Applied: {{ ansible_date_time.iso8601 }}
      Host: {{ ansible_hostname }}
      Updated Packages:
      {{ security_updates.results | default([]) | to_nice_yaml }}
      ====================================
    dest: /var/log/security-patching.log
    mode: '0644'
  when: security_updates.changed | default(false)
  tags: logging