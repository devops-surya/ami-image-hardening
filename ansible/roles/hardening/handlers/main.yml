---
- name: reload sysctl
  command: sysctl -p

- name: restart sshd
  systemd:
    name: sshd
    state: restarted
    daemon_reload: yes

- name: reload auditd rules
  command: augenrules --load
  failed_when: false

- name: restart fail2ban
  systemd:
    name: fail2ban
    state: restarted
  failed_when: false

- name: restart chronyd
  service:
    name: chronyd
    state: restarted